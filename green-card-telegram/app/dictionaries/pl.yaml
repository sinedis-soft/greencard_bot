  ask_consent: |
    Polityka przetwarzania danych osobowych SINEDIS
    SINEDIS Sp. z o.o. przetwarza dane osobowe zgodnie z Rozporządzeniem UE 2016/679 (GDPR / RODO) oraz przepisami prawa polskiego.
    Dane są wykorzystywane do:
    • kalkulacji ofert ubezpieczeniowych;
    • zawierania i obsługi umów ubezpieczenia;
    • kontaktu z klientem;
    • realizacji obowiązków wynikających z przepisów prawa;
    • komunikacji marketingowej po uzyskaniu zgody użytkownika.
    Mogą być przetwarzane:
    imię, telefon, e-mail, adres, dane pojazdu, dane ubezpieczeniowe, dane płatnicze i techniczne.
    Dane mogą być przekazywane firmom ubezpieczeniowym, wykonawcom IT oraz innym partnerom niezbędnym do świadczenia usług.
    Użytkownik ma prawo:
    • uzyskać dostęp do danych;
    • poprawić lub usunąć dane;
    • ograniczyć przetwarzanie;
    • wycofać zgodę;
    • złożyć skargę do PUODO.
    Administratorem danych może być firma ubezpieczeniowa wystawiająca polisę lub SINEDIS Sp. z o.o.
    Kontakt:
    SINEDIS Sp. z o.o.
    ul. Dobrzańskiego Hubala 22D, 01-473 Warszawa, Polska
    info@sinedis.pl
    odo@sinedis.pl - inspektor ochrony danych
    Pełna wersja polityki:
    https://greencard.agency
    ________________________
    Czy wyrażasz zgodę na przetwarzanie i przekazywanie danych osobowych?"
