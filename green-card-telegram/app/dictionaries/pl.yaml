faq:
  title: "Wybierz kategorię FAQ"
  categories:
    documents: "Dokumenty do wystawienia"
    payment: "Płatność"
    coverage: "Zakres ochrony"
    mistakes: "Na co zwrócić uwagę"
    refund: "Zwrot"
  answers:
    documents: |
      Do wystawienia polisy wymagane są następujące dane: dane paszportowe, dane pojazdu oraz daty obowiązywania ubezpieczenia
      Dlatego należy przygotować:
      - paszport
      - dowód rejestracyjny pojazdu
      - dane techniczne pojazdu
      - numer telefonu
      - e-Mail
    payment: |
      Dostępne:
      - płatność przelewem na polską kartę, 
      - płatność BLIK na numer telefonu, 
      - płatność przelewem na polski rachunek bankowy"
    coverage: "Terytorium ochrony: A - Austria, B - Belgia, BG - Bułgaria, CY - Cypr, CZ - Czechy, D - Niemcy, DK - Dania, E - Hiszpania, EST - Estonia, F - Francja, FIN - Finlandia, GR - Grecja, H - Węgry, HR - Chorwacja, I - Włochy, IRL - Irlandia, IS - Islandia, L - Luksemburg, LT - Litwa, LV - Łotwa, M - Malta, N - Norwegia, NL - Holandia, P - Portugalia, PL - Polska, RO - Rumunia, S - Szwecja, SK - Słowacja, SLO - Słowenia, CH - Szwajcaria."
    mistakes: "Proszę dwukrotnie sprawdzić VIN, numer rejestracyjny oraz okres ubezpieczenia przed wysłaniem. Późniejsza korekta nie będzie możliwa!"
    refund: "Zwrot środków nie jest realizowany."

