  ask_consent: |
    SINEDIS Personal Data Processing Policy
    SINEDIS Sp. z o.o. processes personal data in accordance with EU Regulation 2016/679 (GDPR / RODO) and Polish law.
    The data is used for:
    • calculating insurance offers;
    • issuing and servicing insurance contracts;
    • contacting the client;
    • fulfilling legal requirements;
    • marketing communication, subject to the user's consent.
    The following data may be processed:
    first name, phone number, e-mail, address, vehicle details, insurance information, payment and technical data.
    Data may be transferred to insurance companies, IT contractors and other partners necessary for providing services.
    The user has the right to:
    • access the data;
    • correct or delete the data;
    • restrict processing;
    • withdraw consent;
    • file a complaint with PUODO.
    The data controller may be the insurance company that issued the policy or SINEDIS Sp. z o.o.
    Contacts:
    SINEDIS Sp. z o.o.
    ul. Dobrzańskiego Hubala 22D, 01-473 Warszawa, Polska
    info@sinedis.pl
    odo@sinedis.pl - data protection officer
    Full version of the policy:
    https://greencard.agency
    ________________________
    Do you agree to the processing and transfer of personal data?"
