  title: "Select an FAQ category"
  categories:
    documents: "Documents for issuance"
    payment: "Payment"
    coverage: "Coverage"
    mistakes: "Pay attention"
    refund: "Refund"
  answers:
    documents: |
      To issue the policy, the following data will be required: passport details, vehicle details and the insurance validity dates
      Therefore, you need to prepare:
      - passport
      - vehicle registration certificate
      - technical data of the vehicle
      - phone number
      - e-Mail
    payment: |
      Available:
      - payment by transfer to a Polish card, 
      - payment by BLIK to a phone number, 
      - payment by transfer to a Polish bank account"
    coverage: "Coverage territory: A - Austria, B - Belgium, BG - Bulgaria, CY - Cyprus, CZ - Czech Republic, D - Germany, DK - Denmark, E - Spain, EST - Estonia, F - France, FIN - Finland, GR - Greece, H - Hungary, HR - Croatia, I - Italy, IRL - Ireland, IS - Iceland, L - Luxembourg, LT - Lithuania, LV - Latvia, M - Malta, N - Norway, NL - Netherlands, P - Portugal, PL - Poland, RO - Romania, S - Sweden, SK - Slovakia, SLO - Slovenia, CH - Switzerland."
