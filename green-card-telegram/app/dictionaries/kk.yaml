  ask_consent: |
    SINEDIS дербес деректерді өңдеу саясаты
    SINEDIS Sp. z o.o. дербес деректерді ЕО 2016/679 Регламентіне (GDPR / RODO) және Польша заңнамасына сәйкес өңдейді.
    Деректер келесі мақсаттарда пайдаланылады:
    • сақтандыру ұсыныстарын есептеу;
    • сақтандыру шарттарын рәсімдеу және сүйемелдеу;
    • клиентпен байланыс;
    • заң талаптарын орындау;
    • пайдаланушының келісімі болған жағдайда маркетингтік коммуникация.
    Өңделуі мүмкін:
    аты, телефон, e-mail, мекенжай, көлік құралы туралы деректер, сақтандыру ақпараты, төлем және техникалық деректер.
    Деректер сақтандыру компанияларына, IT-мердігерлерге және қызмет көрсету үшін қажет басқа серіктестерге берілуі мүмкін.
    Пайдаланушының құқығы бар:
    • деректерге қол жеткізу;
    • деректерді түзету немесе жою;
    • өңдеуді шектеу;
    • келісімді қайтарып алу;
    • PUODO-ға шағым беру.
    Деректер әкімшісі полисті рәсімдеген сақтандыру компаниясы немесе SINEDIS Sp. z o.o. болуы мүмкін.
    Байланыс:
    SINEDIS Sp. z o.o.
    ul. Dobrzańskiego Hubala 22D, 01-473 Warszawa, Polska
    info@sinedis.pl
    odo@sinedis.pl - деректерді қорғау инспекторы
    Саясаттың толық нұсқасы:
    https://greencard.agency
    ________________________
    Дербес деректерді өңдеуге және беруге келісесіз бе?"
