  answers:
    documents: |
      Полисті рәсімдеу үшін келесі деректер қажет: паспорт деректері, көлік құралы туралы деректер және сақтандыру мерзімі туралы ақпарат
      Сондықтан сізге дайындау қажет:
      - паспорт
      - көлік құралын тіркеу куәлігі
      - автокөліктің техникалық деректері
      - телефон нөмірі
      - e-Mail
    payment: |
      Қолжетімді:
      - поляк картасына аударым арқылы төлем, 
      - телефон нөміріне BLIK арқылы төлем, 
      - поляк банктік шотына аударым арқылы төлем"
    coverage: "Қамту аумағы: A - Австрия, B - Бельгия, BG - Болгария, CY - Кипр, CZ - Чехия, D - Германия, DK - Дания, E - Испания, EST - Эстония, F - Франция, FIN - Финляндия, GR - Греция, H - Венгрия, HR - Хорватия, I - Италия, IRL - Ирландия, IS - Исландия, L - Люксембург, LT - Литва, LV - Латвия, M - Мальта, N - Норвегия, NL - Нидерланды, P - Португалия, PL - Польша, RO - Румыния, S - Швеция, SK - Словакия, SLO - Словения, CH - Швейцария."
