  ask_consent: |
    SINEDIS-ის პერსონალური მონაცემების დამუშავების პოლიტიკა
    SINEDIS Sp. z o.o. პერსონალურ მონაცემებს ამუშავებს ევროკავშირის რეგლამენტის 2016/679 (GDPR / RODO) და პოლონეთის კანონმდებლობის შესაბამისად.
    მონაცემები გამოიყენება:
    • სადაზღვევო შეთავაზებების გამოსათვლელად;
    • სადაზღვევო ხელშეკრულებების გასაფორმებლად და მომსახურებისთვის;
    • კლიენტთან დასაკავშირებლად;
    • კანონმდებლობით გათვალისწინებული მოთხოვნების შესასრულებლად;
    • მარკეტინგული კომუნიკაციისთვის მომხმარებლის თანხმობის არსებობის შემთხვევაში.
    შეიძლება დამუშავდეს:
    სახელი, ტელეფონი, e-mail, მისამართი, სატრანსპორტო საშუალების მონაცემები, სადაზღვევო ინფორმაცია, გადახდის და ტექნიკური მონაცემები.
    მონაცემები შეიძლება გადაეცეს სადაზღვევო კომპანიებს, IT-კონტრაქტორებს და სხვა პარტნიორებს, რომლებიც აუცილებელია მომსახურების გასაწევად.
    მომხმარებელს აქვს უფლება:
    • მიიღოს წვდომა მონაცემებზე;
    • შეასწოროს ან წაშალოს მონაცემები;
    • შეზღუდოს დამუშავება;
    • გააუქმოს თანხმობა;
    • შეიტანოს საჩივარი PUODO-ში.
    მონაცემთა ადმინისტრატორი შეიძლება იყოს სადაზღვევო კომპანია, რომელმაც გასცა პოლისი, ან SINEDIS Sp. z o.o.
    კონტაქტები:
    SINEDIS Sp. z o.o.
    ul. Dobrzańskiego Hubala 22D, 01-473 Warszawa, Polska
    info@sinedis.pl
    odo@sinedis.pl - მონაცემთა დაცვის ინსპექტორი
