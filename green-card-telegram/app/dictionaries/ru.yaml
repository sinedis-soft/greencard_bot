  ask_consent: |
    Политика обработки персональных данных SINEDIS
    SINEDIS Sp. z o.o. обрабатывает персональные данные в соответствии с Регламентом ЕС 2016/679 (GDPR / RODO) и законодательством Польши.
    Данные используются для:
    • расчёта страховых предложений;
    • оформления и сопровождения страховых договоров;
    • связи с клиентом;
    • выполнения требований законодательства;
    • маркетинговой коммуникации при наличии согласия пользователя.
    Могут обрабатываться:
    имя, телефон, e-mail, адрес, данные транспортного средства, страховая информация, платёжные и технические данные.
    Данные могут передаваться страховым компаниям, IT-подрядчикам и иным партнёрам, необходимым для оказания услуг.
    Пользователь имеет право:
    • получить доступ к данным;
    • исправить или удалить данные;
    • ограничить обработку;
    • отозвать согласие;
    • подать жалобу в PUODO.
    Администратором данных может выступать страховая компания, оформившая полис, либо SINEDIS Sp. z o.o.
    Контакты:
    SINEDIS Sp. z o.o.
    ul. Dobrzańskiego Hubala 22D, 01-473 Warszawa, Polska
    info@sinedis.pl
    odo@sinedis.pl - инспектор охраны данных
    Полная версия политики:
    https://greencard.agency
    ________________________
    Согласны на обработку и передачу персональных данных?"
